<?xml version="1.0" encoding="UTF-8"?>
<svg width="180" height="120" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 120">
  <!-- 定义样式 -->
  <defs>
    <style>
      .title-text { font-family: Arial, sans-serif; font-size: 8px; font-weight: bold; fill: #000000; }
      .axis-text { font-family: Arial, sans-serif; font-size: 5px; fill: #000000; }
      .label-text { font-family: Arial, sans-serif; font-size: 6px; font-weight: bold; fill: #000000; }
      .value-text { font-family: Arial, sans-serif; font-size: 4px; font-weight: bold; fill: #000000; }
      .legend-text { font-family: Arial, sans-serif; font-size: 5px; fill: #000000; }
      .sig-text { font-family: Arial, sans-serif; font-size: 6px; font-weight: bold; fill: #E74C3C; }
      
      .exp-bar { fill: #2C3E50; stroke: #000000; stroke-width: 0.2; }
      .ctrl-bar { fill: #7FB3D3; stroke: #000000; stroke-width: 0.2; }
      .grid-line { stroke: #CCCCCC; stroke-width: 0.3; }
      .axis-line { stroke: #000000; stroke-width: 0.8; }
    </style>
  </defs>
  
  <!-- 背景 -->
  <rect width="180" height="120" fill="#FFFFFF"/>
  
  <!-- 标题 -->
  <text x="90" y="8" text-anchor="middle" class="title-text">Experimental Results Comparison</text>
  
  <!-- 绘图区域背景 -->
  <rect x="20" y="15" width="140" height="80" fill="#FAFAFA" stroke="#CCCCCC" stroke-width="0.3"/>
  
  <!-- 网格线 -->
  <line x1="20" y1="27" x2="160" y2="27" class="grid-line"/>
  <line x1="20" y1="39" x2="160" y2="39" class="grid-line"/>
  <line x1="20" y1="51" x2="160" y2="51" class="grid-line"/>
  <line x1="20" y1="63" x2="160" y2="63" class="grid-line"/>
  <line x1="20" y1="75" x2="160" y2="75" class="grid-line"/>
  <line x1="20" y1="87" x2="160" y2="87" class="grid-line"/>
  
  <!-- Y轴左侧 -->
  <line x1="20" y1="15" x2="20" y2="95" class="axis-line"/>
  
  <!-- Y轴刻度标签（左侧，成绩） -->
  <text x="18" y="17" text-anchor="end" class="axis-text">100</text>
  <text x="18" y="29" text-anchor="end" class="axis-text">80</text>
  <text x="18" y="41" text-anchor="end" class="axis-text">60</text>
  <text x="18" y="53" text-anchor="end" class="axis-text">40</text>
  <text x="18" y="65" text-anchor="end" class="axis-text">20</text>
  <text x="18" y="77" text-anchor="end" class="axis-text">0</text>
  
  <!-- Y轴右侧 -->
  <line x1="160" y1="15" x2="160" y2="95" class="axis-line"/>
  
  <!-- Y轴刻度标签（右侧，百分比） -->
  <text x="162" y="17" class="axis-text">100%</text>
  <text x="162" y="29" class="axis-text">80%</text>
  <text x="162" y="41" class="axis-text">60%</text>
  <text x="162" y="53" class="axis-text">40%</text>
  <text x="162" y="65" class="axis-text">20%</text>
  <text x="162" y="77" class="axis-text">0%</text>
  
  <!-- X轴 -->
  <line x1="20" y1="95" x2="160" y2="95" class="axis-line"/>
  
  <!-- 期末成绩柱状图 -->
  <g>
    <!-- 实验组 85.6分 -->
    <rect x="25" y="26" width="8" height="69" class="exp-bar"/>
    <!-- 对照组 78.2分 -->
    <rect x="34" y="37" width="8" height="58" class="ctrl-bar"/>
    
    <!-- 数值标签 -->
    <text x="29" y="24" text-anchor="middle" class="value-text">85.6</text>
    <text x="38" y="35" text-anchor="middle" class="value-text">78.2</text>
  </g>
  
  <!-- 实验成绩柱状图 -->
  <g>
    <!-- 实验组 91.3分 -->
    <rect x="50" y="22" width="8" height="73" class="exp-bar"/>
    <!-- 对照组 82.7分 -->
    <rect x="59" y="35" width="8" height="60" class="ctrl-bar"/>
    
    <!-- 数值标签 -->
    <text x="54" y="20" text-anchor="middle" class="value-text">91.3</text>
    <text x="63" y="33" text-anchor="middle" class="value-text">82.7</text>
  </g>
  
  <!-- 学习完成率柱状图 -->
  <g>
    <!-- 实验组 94.2% -->
    <rect x="75" y="21" width="8" height="74" class="exp-bar"/>
    <!-- 对照组 81.5% -->
    <rect x="84" y="37" width="8" height="58" class="ctrl-bar"/>
    
    <!-- 数值标签 -->
    <text x="79" y="19" text-anchor="middle" class="value-text">94.2</text>
    <text x="88" y="35" text-anchor="middle" class="value-text">81.5</text>
  </g>
  
  <!-- 课程满意度柱状图 -->
  <g>
    <!-- 实验组 8.7分 -->
    <rect x="100" y="26" width="8" height="69" class="exp-bar"/>
    <!-- 对照组 7.3分 -->
    <rect x="109" y="40" width="8" height="55" class="ctrl-bar"/>
    
    <!-- 数值标签 -->
    <text x="104" y="24" text-anchor="middle" class="value-text">8.7</text>
    <text x="113" y="38" text-anchor="middle" class="value-text">7.3</text>
  </g>
  
  <!-- X轴标签 -->
  <text x="37" y="105" text-anchor="middle" class="label-text">Final Exam</text>
  <text x="62" y="105" text-anchor="middle" class="label-text">Lab Score</text>
  <text x="87" y="105" text-anchor="middle" class="label-text">Completion</text>
  <text x="112" y="105" text-anchor="middle" class="label-text">Satisfaction</text>
  
  <!-- 显著性标记 -->
  <text x="37" y="13" text-anchor="middle" class="sig-text">***</text>
  <text x="62" y="13" text-anchor="middle" class="sig-text">***</text>
  <text x="87" y="13" text-anchor="middle" class="sig-text">***</text>
  <text x="112" y="13" text-anchor="middle" class="sig-text">***</text>
  
  <!-- 图例 -->
  <g transform="translate(125, 20)">
    <rect x="0" y="0" width="6" height="4" class="exp-bar"/>
    <text x="8" y="3" class="legend-text">Experimental</text>
    
    <rect x="0" y="6" width="6" height="4" class="ctrl-bar"/>
    <text x="8" y="9" class="legend-text">Control</text>
    
    <text x="0" y="16" class="legend-text">*** p&lt;0.001</text>
  </g>
  
  <!-- Y轴标签 -->
  <text x="10" y="56" text-anchor="middle" class="axis-text" transform="rotate(-90, 10, 56)">Score</text>
  <text x="170" y="56" text-anchor="middle" class="axis-text" transform="rotate(90, 170, 56)">Percentage</text>
  
  <!-- 样本说明 -->
  <text x="90" y="117" text-anchor="middle" class="legend-text">n=160 per group, Independent samples t-test</text>
</svg>