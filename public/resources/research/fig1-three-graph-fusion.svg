<?xml version="1.0" encoding="UTF-8"?>
<svg width="180" height="140" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 140">
  <!-- 定义样式 -->
  <defs>
    <style>
      .title-text { font-family: Arial, sans-serif; font-size: 8px; font-weight: bold; fill: #000000; }
      .label-text { font-family: Arial, sans-serif; font-size: 6px; font-weight: normal; fill: #000000; }
      .small-text { font-family: Arial, sans-serif; font-size: 5px; fill: #000000; }
      .module-kg { fill: #2C3E50; stroke: #000000; stroke-width: 0.5; }
      .module-pg { fill: #27AE60; stroke: #000000; stroke-width: 0.5; }
      .module-ig { fill: #E67E22; stroke: #000000; stroke-width: 0.5; }
      .center-circle { fill: #FFFFFF; stroke: #000000; stroke-width: 1; }
      .arrow { stroke: #000000; stroke-width: 1; fill: none; marker-end: url(#arrowhead); }
      .connection { stroke: #666666; stroke-width: 0.8; stroke-dasharray: 2,1; fill: none; }
    </style>
    
    <!-- 箭头标记 -->
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0,0 0,4 6,2" fill="#000000"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="180" height="140" fill="#FFFFFF"/>
  
  <!-- 知识图谱 (左上) -->
  <rect x="10" y="20" width="50" height="35" rx="2" class="module-kg"/>
  <text x="35" y="30" text-anchor="middle" class="label-text" fill="#FFFFFF">Knowledge</text>
  <text x="35" y="37" text-anchor="middle" class="label-text" fill="#FFFFFF">Graph</text>
  <text x="35" y="47" text-anchor="middle" class="small-text" fill="#FFFFFF">270 nodes</text>
  <text x="35" y="52" text-anchor="middle" class="small-text" fill="#FFFFFF">4 layers</text>
  
  <!-- 问题图谱 (右上) -->
  <rect x="120" y="20" width="50" height="35" rx="2" class="module-pg"/>
  <text x="145" y="30" text-anchor="middle" class="label-text" fill="#FFFFFF">Problem</text>
  <text x="145" y="37" text-anchor="middle" class="label-text" fill="#FFFFFF">Graph</text>
  <text x="145" y="47" text-anchor="middle" class="small-text" fill="#FFFFFF">826 cases</text>
  <text x="145" y="52" text-anchor="middle" class="small-text" fill="#FFFFFF">5 categories</text>
  
  <!-- 思政图谱 (下方) -->
  <rect x="65" y="100" width="50" height="35" rx="2" class="module-ig"/>
  <text x="90" y="110" text-anchor="middle" class="label-text" fill="#FFFFFF">Ideological</text>
  <text x="90" y="117" text-anchor="middle" class="label-text" fill="#FFFFFF">Graph</text>
  <text x="90" y="127" text-anchor="middle" class="small-text" fill="#FFFFFF">128 points</text>
  <text x="90" y="132" text-anchor="middle" class="small-text" fill="#FFFFFF">3 dimensions</text>
  
  <!-- 中心系统 -->
  <circle cx="90" cy="70" r="18" class="center-circle"/>
  <text x="90" y="67" text-anchor="middle" class="small-text">Teaching</text>
  <text x="90" y="73" text-anchor="middle" class="small-text">System</text>
  
  <!-- 连接箭头 -->
  <line x1="60" y1="37" x2="72" y2="65" class="arrow"/>
  <line x1="120" y1="37" x2="108" y2="65" class="arrow"/>
  <line x1="90" y1="100" x2="90" y2="88" class="arrow"/>
  
  <!-- 融合连接线 -->
  <path d="M 60 30 Q 90 10 120 30" class="connection"/>
  <path d="M 35 55 Q 35 80 65 110" class="connection"/>
  <path d="M 145 55 Q 145 80 115 110" class="connection"/>
  
  <!-- 标题 -->
  <text x="90" y="8" text-anchor="middle" class="title-text">Three-Graph Fusion Teaching Model</text>
  
  <!-- 图例 -->
  <g transform="translate(10, 60)">
    <rect x="0" y="0" width="8" height="6" class="module-kg"/>
    <text x="10" y="5" class="small-text">KG</text>
    
    <rect x="0" y="8" width="8" height="6" class="module-pg"/>
    <text x="10" y="13" class="small-text">PG</text>
    
    <rect x="0" y="16" width="8" height="6" class="module-ig"/>
    <text x="10" y="21" class="small-text">IG</text>
    
    <line x1="0" y1="26" x2="8" y2="26" class="connection"/>
    <text x="10" y="29" class="small-text">Fusion</text>
  </g>
</svg>