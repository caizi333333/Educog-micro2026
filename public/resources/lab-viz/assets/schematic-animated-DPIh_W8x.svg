<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- 定义渐变和动画 -->
  <defs>
    <radialGradient id="ledGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    
    <!-- 连线动画 -->
    <path id="wirePath1" d="M 300 350 L 500 250" stroke="none" fill="none"/>
    <path id="wirePath2" d="M 300 400 L 500 300" stroke="none" fill="none"/>
    <path id="wirePath3" d="M 300 450 L 500 350" stroke="none" fill="none"/>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- 51单片机 -->
  <g transform="translate(50,50)">
    <rect x="200" y="150" width="250" height="350" fill="#fff" stroke="#333" stroke-width="2" rx="10"/>
    <text x="325" y="200" text-anchor="middle" font-size="20" fill="#333">51单片机</text>
    
    <!-- 引脚标注 -->
    <g font-size="14" fill="#666">
      <text x="270" y="250" text-anchor="end">VCC</text>
      <text x="270" y="300" text-anchor="end">GND</text>
      <text x="270" y="350" text-anchor="end">P1.0</text>
      <text x="270" y="400" text-anchor="end">P1.1</text>
      <text x="270" y="450" text-anchor="end">P1.2</text>
    </g>
    
    <!-- 引脚接口 -->
    <g>
      <circle cx="300" cy="250" r="4" fill="#ff0000"/>
      <circle cx="300" cy="300" r="4" fill="#000"/>
      <circle cx="300" cy="350" r="4" fill="#666">
        <animate attributeName="fill" values="#666;#ff0000;#666" dur="3s" begin="0s;led3.end"/>
      </circle>
      <circle cx="300" cy="400" r="4" fill="#666">
        <animate attributeName="fill" values="#666;#ff0000;#666" dur="3s" begin="1s;led3.end+1s"/>
      </circle>
      <circle cx="300" cy="450" r="4" fill="#666">
        <animate attributeName="fill" values="#666;#ff0000;#666" dur="3s" begin="2s;led3.end+2s"/>
      </circle>
    </g>
  </g>
  
  <!-- LED组 -->
  <g transform="translate(500,200)">
    <!-- LED1 -->
    <g transform="translate(0,50)">
      <circle cx="0" cy="0" r="20" fill="#ff0000" opacity="0.3">
        <animate id="led1" attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="0s;led3.end"/>
      </circle>
      <circle cx="0" cy="0" r="25" fill="url(#ledGlow)" opacity="0">
        <animate attributeName="opacity" values="0;0.8;0" dur="3s" begin="0s;led3.end"/>
      </circle>
    </g>
    
    <!-- LED2 -->
    <g transform="translate(0,100)">
      <circle cx="0" cy="0" r="20" fill="#ff0000" opacity="0.3">
        <animate id="led2" attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="1s;led3.end+1s"/>
      </circle>
      <circle cx="0" cy="0" r="25" fill="url(#ledGlow)" opacity="0">
        <animate attributeName="opacity" values="0;0.8;0" dur="3s" begin="1s;led3.end+1s"/>
      </circle>
    </g>
    
    <!-- LED3 -->
    <g transform="translate(0,150)">
      <circle cx="0" cy="0" r="20" fill="#ff0000" opacity="0.3">
        <animate id="led3" attributeName="opacity" values="0.3;1;0.3" dur="3s" begin="2s;led3.end+2s"/>
      </circle>
      <circle cx="0" cy="0" r="25" fill="url(#ledGlow)" opacity="0">
        <animate attributeName="opacity" values="0;0.8;0" dur="3s" begin="2s;led3.end+2s"/>
      </circle>
    </g>
    
    <!-- 连接线 -->
    <g stroke="#333" stroke-width="2">
      <!-- LED1连线 -->
      <line x1="-200" y1="50" x2="-20" y2="50">
        <animate attributeName="stroke" values="#333;#ff0000;#333" dur="3s" begin="0s;led3.end"/>
      </line>
      
      <!-- LED2连线 -->
      <line x1="-200" y1="100" x2="-20" y2="100">
        <animate attributeName="stroke" values="#333;#ff0000;#333" dur="3s" begin="1s;led3.end+1s"/>
      </line>
      
      <!-- LED3连线 -->
      <line x1="-200" y1="150" x2="-20" y2="150">
        <animate attributeName="stroke" values="#333;#ff0000;#333" dur="3s" begin="2s;led3.end+2s"/>
      </line>
    </g>
  </g>
  
  <!-- 接线指导 -->
  <g transform="translate(50,520)">
    <text font-size="14" fill="#333">
      <tspan x="0" dy="0">接线说明：</tspan>
      <tspan x="0" dy="20">1. VCC连接5V电源</tspan>
      <tspan x="0" dy="20">2. GND连接地线</tspan>
      <tspan x="0" dy="20">3. P1.0~P1.2分别连接LED1~LED3的阳极</tspan>
    </text>
  </g>
</svg>